<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Apps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      max-width: 700px;
      margin: 4rem auto;
      padding: 0 1.5rem;
      background: #0f0f0f;
      color: #e8e8e8;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #fff;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    li a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      text-decoration: none;
      color: #e8e8e8;
      transition: border-color 0.15s, background 0.15s;
    }

    li a:hover {
      border-color: #555;
      background: #1a1a1a;
    }

    li a .name {
      font-weight: 500;
    }

    li a .desc {
      margin-left: auto;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>Web Apps</h1>
  <ul>
    <li>
      <a href="markdown-to-html-converter/index.html">
        <span class="name">Markdown to HTML Converter</span>
        <span class="desc">Convert Markdown to HTML</span>
      </a>
    </li>
  </ul>
</body>
</html>
